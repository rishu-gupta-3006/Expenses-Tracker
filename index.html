<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Expense Tracker</h1>
            <p>Manage your finances efficiently</p>
        </div>

        <div class="summary">
            <div class="summary-card">
                <h3>Total Income</h3>
                <p class="income" id="totalIncome">$0.00</p>
            </div>
            <div class="summary-card">
                <h3>Total Expenses</h3>
                <p class="expense" id="totalExpense">$0.00</p>
            </div>
            <div class="summary-card">
                <h3>Balance</h3>
                <p class="balance" id="balance">$0.00</p>
            </div>
        </div>

        <div class="form-section">
            <h2>Add New Transaction</h2>
            <form id="transactionForm">
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" placeholder="e.g., Grocery shopping" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="amount">Amount ($)</label>
                        <input type="number" id="amount" step="0.01" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label for="type">Type</label>
                        <select id="type" required>
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="Food">Food</option>
                            <option value="Transportation">Transportation</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Bills">Bills</option>
                            <option value="Healthcare">Healthcare</option>
                            <option value="Salary">Salary</option>
                            <option value="Freelance">Freelance</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" required>
                    </div>
                </div>
                <button type="submit" class="btn">Add Transaction</button>
            </form>
        </div>

        <div class="transactions">
            <h2>Transaction History</h2>
            <div class="filter-section">
                <label for="filterCategory">Filter by Category: </label>
                <select id="filterCategory">
                    <option value="all">All Categories</option>
                    <option value="Food">Food</option>
                    <option value="Transportation">Transportation</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Bills">Bills</option>
                    <option value="Healthcare">Healthcare</option>
                    <option value="Salary">Salary</option>
                    <option value="Freelance">Freelance</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <ul class="transaction-list" id="transactionList">
                <li class="no-transactions">No transactions yet. Add your first transaction above!</li>
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
